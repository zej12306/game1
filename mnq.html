<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>凡人修仙传 · 模拟器</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#0a0a12;
      font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    }
    body {
      display:flex; justify-content:center;
    }
    #game-container {
      width:100%; max-width:375px; height:100%;
      background:#0d0d1a; color:#d0cfc5;
      position:relative; overflow:hidden;
    }
    /* loading overlay */
    #loading {
      position:fixed; top:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:375px; height:100%;
      background:#0a0a12; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    #loading .spinner {
      width:32px; height:32px; border:3px solid #2a2a3a;
      border-top-color:#c9a96e; border-radius:50%;
      animation:spin 0.8s linear infinite; margin-bottom:16px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading .text { color:#888; font-size:13px; }
  </style>
</head>
<body>

<div id="game-container">
  <!-- UI 类会清空此容器并重建全部 DOM -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="text">加载中……</div>
  </div>
</div>

<!-- ============================================================
     模块加载器：同步 XHR + eval，处理 import/export/require
     ============================================================ -->
<script>
(function() {
  'use strict';
  window.__loadedModules = {};

  function loadModuleSync(url, moduleName) {
    if (window.__loadedModules[moduleName]) return;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, false);
    try { xhr.send(null); }
    catch(e) { console.error('[Loader] 加载失败:', url, e); return; }
    if (xhr.status < 200 || xhr.status >= 400) {
      console.error('[Loader] HTTP错误:', url, xhr.status);
      return;
    }
    var code = xhr.responseText;
    // strip import/export/require
    code = code.replace(/^import\s+.*?;$/gm, '');
    code = code.replace(/^export\s*\{[\s\S]*?\};?\s*$/gm, '');
    code = code.replace(/^.*require\(.*?\);?\s*$/gm, '');
    try { (0, eval)(code); } catch(e) { console.error('[Loader] 执行错误:', url, e, e.stack); }
    window.__loadedModules[moduleName] = true;
  }
  window.loadModuleSync = loadModuleSync;
})();
</script>

<!-- ═════ 按依赖顺序加载 ═════ -->
<script>
loadModuleSync('js/data.js',        'data');
loadModuleSync('js/player.js',      'player');
loadModuleSync('js/cultivation.js', 'cultivation');
loadModuleSync('js/skills.js',      'skills');
loadModuleSync('js/equipment.js',   'equipment');
loadModuleSync('js/crafting.js',    'crafting');
loadModuleSync('js/exploration.js', 'exploration');
loadModuleSync('js/world.js',       'world');
loadModuleSync('js/companions.js',  'companions');
loadModuleSync('js/bottle.js',      'bottle');
loadModuleSync('js/events.js',      'events');
loadModuleSync('js/battle.js',      'battle');
loadModuleSync('js/save.js',        'save');
loadModuleSync('js/ui.js',          'ui');
loadModuleSync('js/main.js',        'main');
</script>

</body>
</html>
