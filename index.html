<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凡人修仙传 · 网页模拟器</title>
<script src="data/realms.js"></script>
<script src="data/origins.js"></script>
<script src="data/map_human.js"></script>
<script src="data/skills.js"></script>
<script src="data/map_spirit.js"></script>
<script src="data/map_immortal.js"></script>
<script src="data/enemies.js"></script>
<script src="data/alchemy.js"></script>
<style>
/* ====== THEME VARIABLES ====== */
:root {
  --bg-deep: #0b0b18;
  --bg-surface: #13132a;
  --bg-card: #1a1a35;
  --bg-hover: #222244;
  --text-primary: #e8e6dc;
  --text-secondary: #9897a8;
  --text-tertiary: #5e5d72;

  /* semantic accent colors */
  --gold: #c9a96e;
  --gold-dim: #8a7348;
  --jade: #5b8c5a;
  --jade-dim: #3a5c3a;
  --crimson: #c0392b;
  --crimson-dim: #80231a;
  --azure: #4a8fcf;
  --azure-dim: #2d5c8a;
  --amber: #d4953a;
  --amber-dim: #8a5e25;
  --white: #d4d4dc;

  /* sizing */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --side-width: 280px;
  --topbar-height: 44px;
  --actionbar-height: 52px;

  --font-sans: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
  --font-display: "STKaiti", "KaiTi", "Noto Serif SC", serif;
}

/* ====== RESET ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ====== LAYOUT ====== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 1100px;
  margin: 0 auto;
}

/* top bar */
#topbar {
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
#topbar .brand {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 2px;
}
#topbar .brand span { font-size: 12px; color: var(--text-tertiary); margin-left: 8px; letter-spacing: 0; }
#topbar .tools { display: flex; gap: 12px; align-items: center; }
#topbar .tools button {
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background 0.15s, border-color 0.15s;
}
#topbar .tools button:hover { background: var(--bg-hover); border-color: rgba(255,255,255,0.15); }

/* main body */
#main { display: flex; flex: 1; overflow: hidden; }

/* left panel */
#sidebar {
  width: var(--side-width);
  flex-shrink: 0;
  overflow-y: auto;
  padding: 14px 14px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-right: 1px solid rgba(255,255,255,0.06);
}

/* right panel */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#log-panel {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 0;
}

/* bottom action bar */
#actionbar {
  height: var(--actionbar-height);
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 0 14px 14px;
  align-items: flex-end;
  border-top: 1px solid rgba(255,255,255,0.06);
}
#actionbar button {
  flex: 1;
  max-width: 120px;
  padding: 10px 0;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
}
#actionbar button:hover { background: var(--bg-hover); border-color: rgba(255,255,255,0.2); }
#actionbar button:active { transform: scale(0.97); }
#actionbar button.primary {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,169,110,0.08);
}
#actionbar button.primary:hover { background: rgba(201,169,110,0.15); }
#actionbar button.disabled {
  opacity: 0.35;
  pointer-events: none;
}

/* ====== CARD COMPONENTS ====== */
.card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-md);
  padding: 14px 16px;
}
.card-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

/* realm card */
.realm-name {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  color: var(--gold);
  margin-bottom: 2px;
}
.realm-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.realm-bar { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
.realm-bar-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.realm-bar-text {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-tertiary);
}

/* attributes */
.attr-row {
  display: flex;
  align-items: center;
  margin-bottom: 5px;
  font-size: 12px;
}
.attr-row:last-child { margin-bottom: 0; }
.attr-label {
  width: 20px;
  color: var(--text-tertiary);
  font-size: 12px;
}
.attr-bar-wrap {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  margin: 0 8px;
}
.attr-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.attr-val { width: 26px; text-align: right; font-size: 12px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.attr-bar-fill.atk { background: var(--crimson); }
.attr-bar-fill.def { background: var(--jade); }
.attr-bar-fill.spd { background: var(--amber); }
.attr-bar-fill.wis { background: var(--azure); }
.attr-bar-fill.vit { background: var(--jade-dim); }
.attr-bar-fill.spi { background: var(--azure-dim); }

/* status grid */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.status-item { text-align: center; padding: 6px 0; }
.status-val {
  font-size: 16px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.status-label { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
.status-val.danger { color: var(--crimson); }

/* log */
.log-entry {
  font-size: 12px;
  padding: 4px 0;
  line-height: 1.6;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.log-entry:last-child { border-bottom: none; }
.log-day { color: var(--text-tertiary); margin-right: 6px; min-width: 60px; display: inline-block; }
.log-text { color: var(--text-secondary); }
.log-text.crit { color: var(--gold); }
.log-text.success { color: var(--jade); }
.log-text.danger { color: var(--crimson); }
.log-text.loot { color: var(--azure); }

/* ====== CULTIVATE SELECTOR ====== */
.cult-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.cult-card {
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md);
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.cult-card:hover { border-color: var(--gold); background: rgba(201,169,110,0.05); }
.cult-card.selected { border-color: var(--gold); background: rgba(201,169,110,0.10); }
.cult-card .cult-days { font-size: 18px; font-weight: 500; color: var(--gold); }
.cult-card .cult-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.cult-card .cult-rate { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
.cult-custom-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}
.cult-custom-row input {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font-sans);
  outline: none;
}
.cult-custom-row input:focus { border-color: var(--gold); }
.cult-preview {
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 12px;
}
.cult-preview span { color: var(--gold); }

/* cultivation animation */
.cult-running { pointer-events: none; opacity: 0.6; }
@keyframes log-flash {
  0% { background: rgba(201,169,110,0.15); }
  100% { background: transparent; }
}
.log-flash { animation: log-flash 0.6s ease-out; }

/* death screen */
.death-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin: 12px 0;
}
.death-card {
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md);
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.death-card:hover { border-color: var(--gold); background: rgba(201,169,110,0.05); }
.death-card .death-name { font-size: 15px; font-weight: 500; color: var(--gold); margin-bottom: 2px; }
.death-card .death-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.death-card .death-risk { font-size: 10px; color: var(--amber); margin-top: 4px; }
.death-card.possess-card { border-color: rgba(192,57,43,0.3); }
.death-card.possess-card:hover { border-color: var(--crimson); background: rgba(192,57,43,0.06); }
.death-card.possess-card .death-name { color: var(--crimson); }

.possess-tier-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 8px 0;
}
.possess-tier {
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  padding: 8px 6px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
}
.possess-tier:hover { border-color: var(--crimson); }
.possess-tier .tier-name { font-size: 12px; color: var(--text-primary); }
.possess-tier .tier-rate { font-size: 16px; font-weight: 500; color: var(--crimson); margin: 2px 0; }
.possess-tier .tier-bonus { font-size: 10px; color: var(--text-secondary); }

/* map - visual world map */
#map-container {
  position: relative;
  width: 100%;
  min-height: 420px;
  background: rgba(255,255,255,0.015);
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.04);
}
.map-node-visual {
  position: absolute;
  transform: translate(-50%,-50%);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  z-index: 2;
}
.map-node-visual:hover .map-node-dot { transform: scale(1.3); }
.map-node-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  margin: 0 auto 3px;
  border: 2px solid rgba(255,255,255,0.3);
  background: var(--bg-card);
  transition: transform 0.15s;
}
.map-node-dot.active { background: var(--gold); border-color: var(--gold); }
.map-node-dot.locked { background: transparent; border-color: rgba(255,255,255,0.1); }
.map-node-name { font-size: 10px; color: var(--text-secondary); white-space: nowrap; }
.map-node-name.active { color: var(--gold); font-weight: 500; }
.map-node-name.locked { color: var(--text-tertiary); }
.map-node-detail {
  margin-top: 8px; padding: 8px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  font-size: 11px;
  color: var(--text-secondary);
}
.map-mini-node {
  display: inline-block;
  padding: 2px 8px;
  margin: 2px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  font-size: 10px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.map-mini-node:hover { border-color: var(--gold); color: var(--gold); }
.map-mini-node.current { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.08); }
.map-back { font-size:12px;color:var(--gold);cursor:pointer;margin-bottom:12px;display:inline-block; }

/* skills */
.skill-quality { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-left: 4px; }
.q-common { background: rgba(170,170,170,0.15); color: #aaa; }
.q-uncommon { background: rgba(74,143,207,0.15); color: #4a8fcf; }
.q-rare { background: rgba(176,102,255,0.15); color: #b066ff; }
.q-epic { background: rgba(201,169,110,0.15); color: #c9a96e; }
.q-legendary { background: rgba(192,57,43,0.15); color: #c0392b; }
.skill-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; margin-left: 4px; }
.tag-atk { background: rgba(192,57,43,0.1); color: var(--crimson); }
.tag-def { background: rgba(91,140,90,0.1); color: var(--jade); }
.tag-spd { background: rgba(212,149,58,0.1); color: var(--amber); }
.tag-wis { background: rgba(74,143,207,0.1); color: var(--azure); }
.tag-vit { background: rgba(91,140,90,0.1); color: var(--jade); }
.tag-spi { background: rgba(74,143,207,0.1); color: var(--azure); }
.tag-special { background: rgba(176,102,255,0.1); color: #b066ff; }
.skill-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 9px; background: var(--bg-surface); border-radius: var(--radius-sm); margin-bottom: 4px;
}
.skill-row:hover { background: var(--bg-hover); }
.skill-row.locked { opacity: 0.4; }
.skill-btn {
  font-size: 10px; padding: 3px 8px; border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 3px; background: transparent; color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans);
}
.skill-btn:hover { border-color: var(--gold); color: var(--gold); }
.skill-btn.primary { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.08); }
.skill-btn.danger { border-color: var(--crimson); color: var(--crimson); }

/* combat */
.combat-info { font-size:12px;color:var(--text-secondary);margin-bottom:4px; }
.combat-bar { height:6px;background:rgba(255,255,255,0.05);border-radius:3px;margin-bottom:8px; }
.combat-bar-fill { height:100%;border-radius:3px;transition:width 0.3s; }
.combat-bar-fill.enemy { background:var(--crimson); }
.combat-bar-fill.player { background:var(--jade); }
.combat-action-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:6px; }
.combat-action-btn {
  padding:8px 4px;font-size:11px;border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);
  cursor:pointer;font-family:var(--font-sans);text-align:center;
}
.combat-action-btn:hover { border-color:var(--gold); }
.combat-action-btn.cd { opacity:0.4;pointer-events:none; }
.combat-log { font-size:11px;color:var(--text-tertiary);max-height:80px;overflow-y:auto;margin-top:8px; }

/* ====== MODAL ====== */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.active { display: flex; }
#modal-box {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 24px;
  min-width: 320px;
  max-width: 480px;
}
#modal-title { font-size: 16px; font-weight: 500; color: var(--gold); margin-bottom: 12px; }
#modal-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 18px; }
#modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
#modal-actions button {
  padding: 8px 20px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-sans);
}
#modal-actions button:hover { background: var(--bg-hover); }
#modal-actions button.primary { background: rgba(201,169,110,0.12); border-color: var(--gold); color: var(--gold); }

/* ====== ANIMATIONS ====== */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.pulse { animation: pulse 1.4s ease-in-out infinite; }

@keyframes glow-danger {
  0%, 100% { color: var(--crimson); }
  50% { color: var(--crimson-dim); }
}
.glow-danger { animation: glow-danger 0.8s ease-in-out infinite; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

/* responsive */
@media (max-width: 720px) {
  #main { flex-direction: column; }
  #sidebar {
    width: 100%;
    flex-shrink: 1;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 10px;
    max-height: 40vh;
  }
  #actionbar button { font-size: 12px; padding: 8px 0; }
}

/* landing */
#landing {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-page);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity 0.4s;
}
#landing.fade { opacity: 0; pointer-events: none; }
.landing-title {
  font-family: var(--font-display); font-size: 32px; font-weight: 500;
  color: var(--gold); margin-bottom: 4px;
}
.landing-sub {
  font-size: 14px; color: var(--text-tertiary); margin-bottom: 32px; letter-spacing: 4px;
}
.landing-btn {
  width: 200px; padding: 12px 0; margin: 6px 0;
  border: 1px solid rgba(201,169,110,0.3); border-radius: var(--radius-md);
  background: transparent; color: var(--gold); font-size: 14px;
  cursor: pointer; font-family: var(--font-sans);
  transition: all 0.15s;
}
.landing-btn:hover { border-color: var(--gold); background: rgba(201,169,110,0.08); }
.landing-btn.ghost { border-color: rgba(255,255,255,0.1); color: var(--text-secondary); }
.landing-btn.ghost:hover { border-color: rgba(255,255,255,0.2); }

#tooltip { display:none; }

/* alchemy */
.alchemy-crafting { animation: pulse 1s ease-in-out infinite; }
.alchemy-success { animation: log-flash 0.4s ease-out; }
</style>
</head>

<body>

<div id="landing">
  <div class="landing-title">凡人修仙传</div>
  <div class="landing-sub">网 页 模 拟 器</div>
  <button class="landing-btn" id="btn-continue" onclick="startGame(true)">继 续</button>
  <button class="landing-btn" onclick="startGame(false)">新 游 戏</button>
  <button class="landing-btn ghost" onclick="document.getElementById('landing').classList.add('fade')">存档管理</button>
</div>

<div id="app">

  <div id="topbar">
    <div class="brand">凡人修仙传<span>网页模拟器</span></div>
    <div class="tools">
      <button onclick="openSaveManager()">存档</button>
      <button onclick="loadGame()">读档</button>
      <button onclick="showPastLives()">前世</button>
      <button onclick="resetGame()">重置</button>
    </div>
  </div>

  <div id="main">
    <div id="sidebar">
      <div class="card" id="realm-card">
        <div class="card-label">当前境界</div>
        <div class="realm-name" id="realm-name">--</div>
        <div class="realm-sub" id="realm-sub">--</div>
        <div class="realm-bar"><div class="realm-bar-fill" id="realm-bar-fill" style="width:0%"></div></div>
        <div class="realm-bar-text"><span id="realm-cult">--</span><span id="realm-cultmax">--</span></div>
        <div style="margin-top:8px;font-size:11px;color:var(--text-tertiary);" id="origin-display"></div>
      </div>

      <div class="card" id="attr-card">
        <div class="card-label">属性六维</div>
        <div id="attr-rows"></div>
      </div>

      <div class="card" id="status-card">
        <div id="lifespan-bar-wrap" style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-tertiary);margin-bottom:3px;">
            <span>寿元</span><span id="lifespan-text">--</span>
          </div>
          <div class="realm-bar"><div class="realm-bar-fill" id="lifespan-bar-fill" style="width:0%;background:var(--jade);"></div></div>
        </div>
        <div class="status-grid" id="status-grid"></div>
      </div>
    </div>

    <div id="content">
      <div id="log-panel">
        <div class="card-label">修行日志</div>
        <div id="log-entries"></div>
      </div>
      <div id="map-panel" style="display:none;flex:1;overflow-y:auto;padding:14px;">
        <div id="map-content"></div>
      </div>
      <div id="skills-panel" style="display:none;flex:1;overflow-y:auto;padding:14px;">
        <div id="skills-content"></div>
      </div>
      <div id="actionbar">
        <button id="btn-cultivate" onclick="openCultivateSelector()">修炼</button>
        <button id="btn-breakthrough" onclick="doBreakthrough()">突破</button>
        <button id="btn-explore" onclick="doExplore()">探索</button>
        <button id="btn-ascend" onclick="doAscend()">飞升</button>
        <button id="btn-skills" onclick="toggleSkills()">功法</button>
        <button id="btn-bag" onclick="openModal('背包', makeBagDisplay())">背包</button>
        <button id="btn-alchemy" onclick="openAlchemy()">炼丹</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
    <div id="modal-actions"></div>
  </div>
</div>

<script src="js/narrative.js"></script>
<script src="js/cultivate.js"></script>
<script src="js/map.js"></script>
<script src="js/skills.js"></script>
<script src="js/save.js"></script>
<script src="js/combat.js"></script>
<script src="js/alchemy.js"></script>
<script src="js/init.js"></script>
</body>
</html>
